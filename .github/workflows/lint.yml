name: Lint and Format CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: "3.9"
        
    - name: Install Linting Tools
      run: |
        python -m pip install --upgrade pip
        pip install black flake8

    - name: Code Formatting Check (Black)
      run: |
        black --check .

    - name: Code Quality & Syntax (Flake8)
      run: |
        # Stop the build if there are critical Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Run standard linting as non-blocking warnings
        flake8 . --count --exit-zero --max-complexity=15 --max-line-length=100 --statistics
